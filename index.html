<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulpar Command</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --border: #e5e5e5;
            --hover: #f5f5f5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --fg: #ffffff;
                --border: #333333;
                --hover: #222222;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0; font-size: 1.2rem; font-weight: 500; }
        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 1rem 0; color: #888; }
        
        .status { font-size: 0.85rem; color: #888; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .panel {
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 4px;
        }

        .row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
        }

        input, select, button {
            padding: 0.5rem 0.75rem;
            font-family: inherit;
            font-size: 0.9rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--fg);
            border-radius: 2px;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--fg); }

        input, select { flex: 1; }
        input[type="number"] { max-width: 60px; }

        button {
            background: var(--fg);
            color: var(--bg);
            cursor: pointer;
            border: 1px solid var(--fg);
            transition: all 0.2s;
            white-space: nowrap;
        }

        button:hover {
            background: var(--bg);
            color: var(--fg);
        }

        .btn-outline {
            background: var(--bg);
            color: var(--fg);
        }

        .btn-outline:hover {
            background: var(--hover);
        }

        #console {
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.8rem;
            color: #888;
            padding: 1rem;
            background: var(--hover);
            border-radius: 2px;
        }

        ul { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; }
        li { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <header>
        <h1>Tulpar Command</h1>
        <div id="status" class="status">System Ready</div>
    </header>

    <div class="grid">
        <div class="panel">
            <h2>Add Bot</h2>
            <div class="row">
                <input id="user" placeholder="Username">
                <input id="pass" type="password" placeholder="Password">
            </div>
            <button onclick="addBot()" style="width: 100%;">Connect</button>
        </div>

        <div class="panel">
            <h2>Active Bot Control</h2>
            <div class="row">
                <select id="bot-select">
                    <option value="" disabled selected>No bots online</option>
                </select>
                <button class="btn-outline" onclick="action('disconnect')">Disconnect</button>
            </div>
            
            <div class="row">
                <span style="font-size: 0.85rem;">Delay (s):</span>
                <input id="delay" type="number" step="0.5" min="0.5" value="2.0">
                <button class="btn-outline" onclick="attack('start')">Attack</button>
                <button class="btn-outline" onclick="attack('stop')">Stop</button>
            </div>

            <button class="btn-outline" onclick="checkInventory()" style="width: 100%; margin-bottom: 1rem;">View Inventory</button>
            <div id="invResult"></div>
        </div>

        <div class="panel">
            <h2>Broadcast</h2>
            <div class="row">
                <input id="msg" placeholder="Message all bots">
                <button class="btn-outline" onclick="broadcast()">Send</button>
            </div>
        </div>
    </div>

    <div class="panel" style="margin-top: 2rem;">
        <h2>Terminal</h2>
        <div id="console"></div>
    </div>

    <script>
        const evtSource = new EventSource('/api/stream');
        const cons = document.getElementById('console');
        evtSource.onmessage = (e) => {
            cons.innerHTML += `<div>${e.data}</div>`;
            cons.scrollTop = cons.scrollHeight;
        };

        const setStatus = (msg) => document.getElementById('status').innerText = msg;

        async function req(endpoint, data) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            setStatus(result.message || result.error);
            updateBotList();
        }

        async function updateBotList() {
            const res = await fetch('/api/bots');
            const bots = await res.json();
            const select = document.getElementById('bot-select');
            const currentVal = select.value;

            select.innerHTML = '';
            if (bots.length === 0) {
                select.innerHTML = '<option value="" disabled selected>No bots online</option>';
                return;
            }

            bots.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b;
                opt.innerText = b;
                select.appendChild(opt);
            });

            if (bots.includes(currentVal)) select.value = currentVal;
        }

        setInterval(updateBotList, 3000); // Auto-refresh dropdown

        function addBot() {
            req('/api/bots/add', { username: user.value, password: pass.value });
            user.value = '';
            pass.value = '';
        }

        function action(type) {
            const bot = document.getElementById('bot-select').value;
            if (bot) req(`/api/bots/${type}`, { username: bot });
        }

        function attack(state) {
            const bot = document.getElementById('bot-select').value;
            const delay = parseFloat(document.getElementById('delay').value);
            if (bot) req(`/api/bots/attack/${state}`, { username: bot, delay });
        }

        function broadcast() {
            req('/api/bots/chat', { target: 'all', message: msg.value });
            msg.value = '';
        }

        async function checkInventory() {
            const user = document.getElementById('bot-select').value;
            if (!user) return;
            
            const res = await fetch(`/api/bots/${user}/inventory`);
            const data = await res.json();
            const invContainer = document.getElementById('invResult');
            
            if (data.error) {
                invContainer.innerText = data.error;
                return;
            }

            if (data.length === 0) {
                invContainer.innerHTML = '<p style="font-size:0.8rem;text-align:center;">Empty</p>';
                return;
            }

            let html = '<ul>';
            data.forEach(item => {
                html += `<li><span>${item.name}</span> <span>${item.count}</span></li>`;
            });
            html += '</ul>';
            invContainer.innerHTML = html;
        }
    </script>
</body>
</html>
