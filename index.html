<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TULPAR_OS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --bg: #0a0a0a;
            --fg: #33ff00;
            --muted: #1f521f;
            --glow: 0 0 5px rgba(51, 255, 0, 0.4);
            --scanline: rgba(0, 0, 0, 0.15);
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            text-transform: uppercase;
            text-shadow: var(--glow);
            margin: 0;
            padding: 2rem;
            line-height: 1.2;
            overflow-x: hidden;
        }

        /* CRT Scanline Overlay */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, var(--scanline) 50%);
            background-size: 100% 4px;
            z-index: 999;
            pointer-events: none;
        }

        header {
            border-bottom: 2px dashed var(--muted);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 { margin: 0; font-size: 2rem; font-weight: normal; }
        .status { color: var(--fg); opacity: 0.8; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .panel {
            border: 1px solid var(--muted);
            padding: 1.5rem;
            position: relative;
        }

        .panel::before {
            content: "+--- " attr(data-title) " ---+";
            position: absolute;
            top: -12px;
            left: 10px;
            background: var(--bg);
            padding: 0 5px;
            color: var(--fg);
        }

        .row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: center;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            flex: 1;
        }

        .input-wrap::before {
            content: ">";
            margin-right: 0.5rem;
            color: var(--fg);
        }

        input, select {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--muted);
            color: var(--fg);
            font-family: inherit;
            font-size: inherit;
            text-shadow: inherit;
            outline: none;
            width: 100%;
            text-transform: uppercase;
            padding: 2px 0;
        }

        input:focus, select:focus { border-bottom-color: var(--fg); }
        option { background: var(--bg); color: var(--fg); }

        .short-input { width: 50px; text-align: center; }

        button {
            background: transparent;
            border: none;
            color: var(--fg);
            font-family: inherit;
            font-size: inherit;
            cursor: pointer;
            text-shadow: inherit;
            transition: none;
            padding: 0;
            white-space: nowrap;
        }

        button::before { content: "[ "; color: var(--muted); }
        button::after { content: " ]"; color: var(--muted); }
        button:hover { background: var(--fg); color: var(--bg); text-shadow: none; }
        button:hover::before, button:hover::after { color: var(--bg); }

        #console {
            height: 200px;
            overflow-y: auto;
            border: 1px solid var(--muted);
            padding: 1rem;
            margin-top: 1rem;
            font-size: 1rem;
            text-transform: none; /* Keep logs readable */
        }

        ul { list-style: none; padding: 0; margin: 0; }
        li { display: flex; justify-content: space-between; border-bottom: 1px dashed var(--muted); padding: 0.2rem 0; }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); border-left: 1px solid var(--muted); }
        ::-webkit-scrollbar-thumb { background: var(--muted); }
        ::-webkit-scrollbar-thumb:hover { background: var(--fg); }
    </style>
</head>
<body>

    <header>
        <h1>TULPAR_OS<span class="blink">_</span></h1>
        <div id="status" class="status">SYS.STATE: OFFLINE</div>
    </header>

    <div class="grid">
        <div class="panel" data-title="AUTH.SYS">
            <div class="row">
                <div class="input-wrap"><input id="user" placeholder="USERNAME"></div>
                <div class="input-wrap"><input id="pass" type="password" placeholder="PASSWORD"></div>
            </div>
            <button onclick="addBot()" style="width: 100%;">EXECUTE_LOGIN</button>
        </div>

        <div class="panel" data-title="UNIT.CTRL">
            <div class="row">
                <div class="input-wrap">
                    <select id="bot-select">
                        <option value="" disabled selected>NO_UNITS_ACTIVE</option>
                    </select>
                </div>
                <button onclick="action('disconnect')">KILL</button>
            </div>
            
            <div class="row">
                <span>DLY:</span>
                <input id="delay" class="short-input" type="number" step="0.5" min="0.5" value="2.0">
                <button onclick="attack('start')">ATK.ON</button>
                <button onclick="attack('stop')">ATK.OFF</button>
            </div>

            <div class="row">
                <span>SLT:</span>
                <select id="hotbar-slot" class="short-input" style="width: auto;">
                    <option value="0">1</option><option value="1">2</option><option value="2">3</option>
                    <option value="3">4</option><option value="4">5</option><option value="5">6</option>
                    <option value="6">7</option><option value="7">8</option><option value="8">9</option>
                </select>
                <button onclick="swapHotbar()" style="flex: 1;">EQUIP_SLOT</button>
            </div>

            <button onclick="checkInventory()" style="width: 100%; margin-top: 1rem;">SCAN_INVENTORY</button>
            <div id="invResult" style="margin-top: 1rem;"></div>
        </div>

        <div class="panel" data-title="COMM.LINK">
            <div class="row">
                <div class="input-wrap">
                    <select id="chat-target-select">
                        <option value="all">BROADCAST_ALL</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="input-wrap"><input id="msg" placeholder="PAYLOAD"></div>
                <button onclick="sendChat()">TX</button>
            </div>
        </div>
    </div>

    <div class="panel" data-title="TERM.OUT" style="margin-top: 2rem;">
        <div id="console"></div>
    </div>

    <script>
        const evtSource = new EventSource('/api/stream');
        const cons = document.getElementById('console');
        evtSource.onmessage = (e) => {
            cons.innerHTML += `<div>${e.data}</div>`;
            cons.scrollTop = cons.scrollHeight;
        };

        const setStatus = (msg) => document.getElementById('status').innerText = `SYS.STATE: ${msg}`;

        async function req(endpoint, data) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            setStatus(result.message || result.error);
            updateBotLists();
        }

        async function updateBotLists() {
            const res = await fetch('/api/bots');
            const bots = await res.json();
            
            const ctrlSelect = document.getElementById('bot-select');
            const chatSelect = document.getElementById('chat-target-select');
            
            const lastCtrlVal = ctrlSelect.value;
            const lastChatVal = chatSelect.value;

            ctrlSelect.innerHTML = '';
            chatSelect.innerHTML = '<option value="all">BROADCAST_ALL</option>';

            if (bots.length === 0) {
                ctrlSelect.innerHTML = '<option value="" disabled selected>NO_UNITS_ACTIVE</option>';
                return;
            }

            bots.forEach(b => {
                const opt1 = document.createElement('option');
                opt1.value = b; opt1.innerText = b;
                ctrlSelect.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = b; opt2.innerText = b;
                chatSelect.appendChild(opt2);
            });

            if (bots.includes(lastCtrlVal)) ctrlSelect.value = lastCtrlVal;
            if (lastChatVal === 'all' || bots.includes(lastChatVal)) chatSelect.value = lastChatVal;
        }

        setInterval(updateBotLists, 3000);

        function addBot() {
            req('/api/bots/add', { username: user.value, password: pass.value });
            user.value = ''; pass.value = '';
        }

        function action(type) {
            const bot = document.getElementById('bot-select').value;
            if (bot) req(`/api/bots/${type}`, { username: bot });
        }

        function attack(state) {
            const bot = document.getElementById('bot-select').value;
            const delay = parseFloat(document.getElementById('delay').value);
            if (bot) req(`/api/bots/attack/${state}`, { username: bot, delay });
        }

        function swapHotbar() {
            const bot = document.getElementById('bot-select').value;
            const slot = document.getElementById('hotbar-slot').value;
            if (bot) req('/api/bots/hotbar', { username: bot, slot: slot });
        }

        function sendChat() {
            const target = document.getElementById('chat-target-select').value;
            req('/api/bots/chat', { target: target, message: msg.value });
            msg.value = '';
        }

        async function checkInventory() {
            const user = document.getElementById('bot-select').value;
            if (!user) return;
            
            const res = await fetch(`/api/bots/${user}/inventory`);
            const data = await res.json();
            const invContainer = document.getElementById('invResult');
            
            if (data.error) {
                invContainer.innerText = `[ERR] ${data.error}`;
                return;
            }

            if (data.length === 0) {
                invContainer.innerHTML = '<div>DATA_NULL</div>';
                return;
            }

            let html = '<ul>';
            data.forEach(item => {
                const countStr = String(item.count).padStart(3, '.');
                html += `<li><span>${item.name}</span><span>${countStr}</span></li>`;
            });
            html += '</ul>';
            invContainer.innerHTML = html;
        }
    </script>
</body>
</html>
