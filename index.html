<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Command</title>
    <style>
        :root {
            --bg: #ffffff;
            --fg: #000000;
            --border: #e5e5e5;
            --hover: #f5f5f5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --fg: #ffffff;
                --border: #222222;
                --hover: #1a1a1a;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0; font-size: 1rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 1rem 0; color: #888; font-weight: 500; }
        
        .status { font-size: 0.8rem; color: #888; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .panel {
            border: 1px solid var(--border);
            padding: 1.5rem;
            border-radius: 0px;
        }

        .row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            align-items: center;
        }

        input, select, button {
            padding: 0.5rem;
            font-family: inherit;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--fg);
            border-radius: 0px;
            outline: none;
        }

        input:focus, select:focus { border-color: var(--fg); }
        input, select { flex: 1; }
        
        .short-input { max-width: 60px; text-align: center; }

        button {
            background: var(--fg);
            color: var(--bg);
            cursor: pointer;
            border: 1px solid var(--fg);
            transition: opacity 0.15s ease;
            white-space: nowrap;
        }

        button:hover { opacity: 0.8; }

        .btn-outline {
            background: var(--bg);
            color: var(--fg);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            background: var(--hover);
            border-color: var(--fg);
        }

        #console {
            height: 250px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            color: #888;
            padding: 1rem;
            background: var(--hover);
            border: 1px solid var(--border);
        }

        ul { list-style: none; padding: 0; margin: 0; font-size: 0.8rem; }
        li { display: flex; justify-content: space-between; padding: 0.25rem 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <header>
        <h1>System Control</h1>
        <div id="status" class="status">Offline</div>
    </header>

    <div class="grid">
        <div class="panel">
            <h2>Authentication</h2>
            <div class="row">
                <input id="user" placeholder="Username">
                <input id="pass" type="password" placeholder="Password">
            </div>
            <button onclick="addBot()" style="width: 100%;">Connect</button>
        </div>

        <div class="panel">
            <h2>Bot Control</h2>
            <div class="row">
                <select id="bot-select">
                    <option value="" disabled selected>No active connections</option>
                </select>
                <button class="btn-outline" onclick="action('disconnect')">Disconnect</button>
            </div>
            
            <div class="row">
                <span class="status">Delay:</span>
                <input id="delay" class="short-input" type="number" step="0.5" min="0.5" value="2.0">
                <button class="btn-outline" onclick="attack('start')">Attack</button>
                <button class="btn-outline" onclick="attack('stop')">Stop</button>
            </div>

            <div class="row">
                <span class="status">Slot:</span>
                <select id="hotbar-slot" class="short-input">
                    <option value="0">1</option>
                    <option value="1">2</option>
                    <option value="2">3</option>
                    <option value="3">4</option>
                    <option value="4">5</option>
                    <option value="5">6</option>
                    <option value="6">7</option>
                    <option value="7">8</option>
                    <option value="8">9</option>
                </select>
                <button class="btn-outline" onclick="swapHotbar()" style="flex: 1;">Equip Slot</button>
            </div>

            <button class="btn-outline" onclick="checkInventory()" style="width: 100%; margin-top: 0.5rem;">Refresh Inventory</button>
            <div id="invResult" style="margin-top: 1rem;"></div>
        </div>

        <div class="panel">
            <h2>Messaging</h2>
            <div class="row">
                <select id="chat-target-select">
                    <option value="all">All Bots</option>
                </select>
            </div>
            <div class="row">
                <input id="msg" placeholder="Message content">
                <button onclick="sendChat()">Send</button>
            </div>
        </div>
    </div>

    <div class="panel" style="margin-top: 2rem;">
        <h2>Terminal Log</h2>
        <div id="console"></div>
    </div>

    <script>
        const evtSource = new EventSource('/api/stream');
        const cons = document.getElementById('console');
        evtSource.onmessage = (e) => {
            cons.innerHTML += `<div>${e.data}</div>`;
            cons.scrollTop = cons.scrollHeight;
        };

        const setStatus = (msg) => document.getElementById('status').innerText = msg;

        async function req(endpoint, data) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            setStatus(result.message || result.error);
            updateBotLists();
        }

        async function updateBotLists() {
            const res = await fetch('/api/bots');
            const bots = await res.json();
            
            const ctrlSelect = document.getElementById('bot-select');
            const chatSelect = document.getElementById('chat-target-select');
            
            const lastCtrlVal = ctrlSelect.value;
            const lastChatVal = chatSelect.value;

            ctrlSelect.innerHTML = '';
            chatSelect.innerHTML = '<option value="all">All Bots</option>';

            if (bots.length === 0) {
                ctrlSelect.innerHTML = '<option value="" disabled selected>No active connections</option>';
                return;
            }

            bots.forEach(b => {
                const opt1 = document.createElement('option');
                opt1.value = b; opt1.innerText = b;
                ctrlSelect.appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = b; opt2.innerText = b;
                chatSelect.appendChild(opt2);
            });

            if (bots.includes(lastCtrlVal)) ctrlSelect.value = lastCtrlVal;
            if (lastChatVal === 'all' || bots.includes(lastChatVal)) chatSelect.value = lastChatVal;
        }

        setInterval(updateBotLists, 3000);

        function addBot() {
            req('/api/bots/add', { username: user.value, password: pass.value });
            user.value = ''; pass.value = '';
        }

        function action(type) {
            const bot = document.getElementById('bot-select').value;
            if (bot) req(`/api/bots/${type}`, { username: bot });
        }

        function attack(state) {
            const bot = document.getElementById('bot-select').value;
            const delay = parseFloat(document.getElementById('delay').value);
            if (bot) req(`/api/bots/attack/${state}`, { username: bot, delay });
        }

        function swapHotbar() {
            const bot = document.getElementById('bot-select').value;
            const slot = document.getElementById('hotbar-slot').value;
            if (bot) req('/api/bots/hotbar', { username: bot, slot: slot });
        }

        function sendChat() {
            const target = document.getElementById('chat-target-select').value;
            req('/api/bots/chat', { target: target, message: msg.value });
            msg.value = '';
        }

        async function checkInventory() {
            const user = document.getElementById('bot-select').value;
            if (!user) return;
            
            const res = await fetch(`/api/bots/${user}/inventory`);
            const data = await res.json();
            const invContainer = document.getElementById('invResult');
            
            if (data.error) {
                invContainer.innerText = data.error;
                return;
            }

            if (data.length === 0) {
                invContainer.innerHTML = '<p style="font-size:0.75rem; text-align:center; color:#888;">Empty</p>';
                return;
            }

            let html = '<ul>';
            data.forEach(item => {
                html += `<li><span>${item.name}</span><span>${item.count}</span></li>`;
            });
            html += '</ul>';
            invContainer.innerHTML = html;
        }
    </script>
</body>
</html>
