<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tulpar Bot Manager</title>
    <style>
        body { font-family: monospace; background: #1e1e2e; color: #cdd6f4; margin: 2rem; }
        .container { display: flex; gap: 2rem; max-width: 1200px; margin: auto; }
        .panel { background: #181825; padding: 1.5rem; border-radius: 8px; flex: 1; border: 1px solid #313244; }
        input, button { padding: 8px; margin: 4px 0; border-radius: 4px; border: 1px solid #45475a; background: #313244; color: #cdd6f4; }
        button { background: #89b4fa; color: #11111b; cursor: pointer; font-weight: bold; }
        button:hover { background: #74c7ec; }
        #console { background: #11111b; height: 300px; overflow-y: auto; padding: 10px; border-radius: 4px; border: 1px solid #313244; font-size: 0.9em; color: #a6e3a1; }
        .status { margin-top: 10px; font-weight: bold; color: #f9e2af; }
    </style>
</head>
<body>
    <h2>Tulpar Bot Manager</h2>
    <div class="container">
        <div class="panel">
            <h3>Controls</h3>
            <div id="status" class="status">Ready.</div>
            <hr>
            
            <h4>Manage Bots</h4>
            <input id="user" placeholder="Username">
            <input id="pass" type="password" placeholder="Password">
            <br>
            <button onclick="req('/api/bots/add', { username: user.value, password: pass.value })">Connect</button>
            <button onclick="req('/api/bots/disconnect', { username: user.value })">Disconnect</button>

            <h4>Chat</h4>
            <input id="target" placeholder="Target (Username or 'all')">
            <input id="msg" placeholder="Message">
            <br>
            <button onclick="req('/api/bots/chat', { target: target.value, message: msg.value })">Send</button>

            <h4>Inventory</h4>
            <input id="invUser" placeholder="Bot Username">
            <br>
            <button onclick="checkInventory()">Refresh</button>
            <pre id="invResult"></pre>
        </div>

        <div class="panel">
            <h3>Live Console</h3>
            <div id="console"></div>
        </div>
    </div>

    <script>
        // Setup Live Console stream
        const evtSource = new EventSource('/api/stream');
        const cons = document.getElementById('console');
        evtSource.onmessage = (e) => {
            cons.innerHTML += `<div>${e.data}</div>`;
            cons.scrollTop = cons.scrollHeight;
        };

        const setStatus = (msg) => document.getElementById('status').innerText = msg;

        async function req(endpoint, data) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            setStatus(result.message || result.error);
        }

        async function checkInventory() {
            const user = document.getElementById('invUser').value;
            const res = await fetch(`/api/bots/${user}/inventory`);
            const data = await res.json();
            document.getElementById('invResult').innerText = data.error ? data.error : JSON.stringify(data, null, 2);
            setStatus(data.error ? "Failed to get inventory" : "Inventory updated");
        }
    </script>
</body>
</html>
