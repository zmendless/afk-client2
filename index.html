<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulpar Command Center</title>
    <style>
        /* Base Styling: White and Black Menus (High Contrast Light Mode) */
        :root { 
            --bg: #fff; 
            --text: #000; 
            --panel-bg: #f9f9f9; 
            --border: #e0e0e0; 
            --primary: #007bff; 
            --log-text: #28a745; 
        }
        
        /* Auto Dark Mode support for high-contrast white and black */
        @media (prefers-color-scheme: dark) { 
            :root { 
                --bg: #121212; 
                --text: #fff; 
                --panel-bg: #1e1e1e; 
                --border: #333; 
                --log-text: #66bb6a; 
            } 
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        header { 
            background-color: var(--panel-bg); 
            color: var(--text); 
            padding: 1rem 2rem; 
            border-bottom: 1px solid var(--border); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        header h1 { margin: 0; font-size: 1.5rem; font-weight: 700; }
        header .status { font-weight: bold; color: var(--text); opacity: 0.7; }

        /* Modern dashboard grid layout */
        .dashboard { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 1.5rem; 
            padding: 2rem; 
            flex: 1; 
            align-items: start; 
        }
        
        /* Clean Card Design */
        .card { 
            background-color: var(--panel-bg); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 1.5rem; 
            display: flex; 
            flex-direction: column; 
            gap: 1rem; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.03); 
        }
        .card h2 { 
            margin: 0 0 0.5rem 0; 
            font-size: 1.25rem; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 0.5rem; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
        }
        
        /* Input group with reduced text/labels */
        .input-group { display: flex; flex-direction: column; gap: 0.5rem; }
        input, select, button { 
            padding: 10px 14px; 
            border-radius: 6px; 
            border: 1px solid var(--border); 
            font-size: 0.9rem; 
            background-color: var(--bg); 
            color: var(--text); 
        }
        input:focus, select:focus { 
            border-color: var(--primary); 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1); 
        }
        
        /* Prettier Buttons with icons and specific colors */
        .btn { 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            text-align: center; 
            transition: opacity 0.2s ease-in-out; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.5rem; 
            color: #fff; 
        }
        .btn:hover { opacity: 0.85; }
        .btn:active { transform: translateY(1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-connect { background-color: #28a745; }
        .btn-disconnect { background-color: #dc3545; }
        .btn-attack-start { background-color: #ffc107; color: #212529; }
        .btn-attack-stop { background-color: #ff851b; }
        .btn-primary { background-color: var(--primary); }

        /* Prettier Console Card */
        .console-card { grid-column: 1 / -1; min-height: 400px; }
        #console { 
            background-color: rgba(0,0,0,0.05); 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            height: 350px; 
            overflow-y: auto; 
            padding: 1rem; 
            color: var(--log-text); 
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; 
            font-size: 0.85rem; 
        }
        
        /* Prettier Inventory View */
        #invResult { font-family: inherit; font-size: 0.85rem; border-radius: 6px; margin: 0; color: inherit; }
        .inventory-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.25rem; }
        .inventory-item { 
            display: flex; 
            justify-content: space-between; 
            padding: 4px 8px; 
            border-bottom: 1px solid var(--border); 
        }
        .item-count { font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>Tulpar Command</h1>
        <div id="status" class="status">● System Ready</div>
    </header>

    <main class="dashboard">
        <div class="card">
            <h2><span class="icon">&#10010;</span> Connect New Bot</h2>
            <div class="input-group">
                <input id="user" placeholder="Username">
                <input id="pass" type="password" placeholder="Password">
            </div>
            <button class="btn btn-connect" onclick="req('/api/bots/add', { username: user.value, password: pass.value })">
                <span class="icon">&#9658;</span> Connect
            </button>
        </div>

        <div class="card">
            <h2><span class="icon">&#128227;</span> Broadcast Chat</h2>
            <div class="input-group">
                <input id="msg" placeholder="Message to everyone">
            </div>
            <button class="btn btn-primary" onclick="req('/api/bots/chat', { target: 'all', message: msg.value })">
                <span class="icon">&#128172;</span> Send to ALL
            </button>
        </div>

        <div class="card">
            <h2><span class="icon">&#128187;</span> Specific Bot Control</h2>
            
            <div class="input-group">
                <input id="bot-target" placeholder="Specific Username">
                <button class="btn btn-disconnect" onclick="req('/api/bots/disconnect', { username: document.getElementById('bot-target').value })">
                    <span class="icon">&#10006;</span> Disconnect
                </button>
            </div>

            <hr style="border: none; border-bottom: 1px solid var(--border);">
            
            <h3><span class="icon">&#128293;</span> Attack Loop</h3>
            <div class="input-group" style="flex-direction: row; gap: 0.5rem; align-items: center;">
                <label style="font-size: 0.8rem; flex: 1;">Delay (s):</label>
                <input id="attack-delay" type="number" step="0.5" min="0.5" value="2.0" style="width: 70px;">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.5rem;">
                <button class="btn btn-attack-start" onclick="reqAttack('start')">
                    <span class="icon">&#128263;</span> Start Attack
                </button>
                <button class="btn btn-attack-stop" onclick="reqAttack('stop')">
                    <span class="icon">&#11036;</span> Stop Attack
                </button>
            </div>

            <hr style="border: none; border-bottom: 1px solid var(--border);">

            <h3><span class="icon">&#128230;</span> Inventory</h3>
            <button class="btn btn-primary" onclick="checkInventory()">
                <span class="icon">&#128260;</span> Refresh Inventory
            </button>
            <div id="invResult"></div>
        </div>

        <div class="card console-card">
            <h2><span class="icon">&#128196;</span> Live Terminal Logs</h2>
            <div id="console"></div>
        </div>
    </main>

    <script>
        // Setup Live Console stream (Server-Sent Events)
        const evtSource = new EventSource('/api/stream');
        const cons = document.getElementById('console');
        evtSource.onmessage = (e) => {
            cons.innerHTML += `<div>${e.data}</div>`;
            cons.scrollTop = cons.scrollHeight;
        };

        // Utility: Update the status bar in the header
        const setStatus = (msg) => document.getElementById('status').innerText = `● ${msg}`;

        // Utility: Standard POST request to backend APIs
        async function req(endpoint, data) {
            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            setStatus(result.message || result.error);
        }

        // GUI Logic: Start or Stop the Attack Loop for the targeted bot
        async function reqAttack(action) {
            const username = document.getElementById('bot-target').value;
            const delay = parseFloat(document.getElementById('attack-delay').value);

            let endpoint = `/api/bots/attack/${action}`;
            let data = { username };
            
            if (action === 'start') {
                data.delay = delay;
            }

            await req(endpoint, data);
        }

        // GUI Logic: Fetch and render a prettier inventory list
        async function checkInventory() {
            const user = document.getElementById('bot-target').value;
            const res = await fetch(`/api/bots/${user}/inventory`);
            const data = await res.json();
            
            const invContainer = document.getElementById('invResult');
            invContainer.innerHTML = ''; // Clear old content

            if (data.error) {
                invContainer.innerText = data.error;
                setStatus("Failed to get inventory");
                return;
            }

            if (data.length === 0) {
                invContainer.innerHTML = '<p style="font-size:0.8rem;opacity:0.5;text-align:center;">Inventory is empty.</p>';
                setStatus("Inventory updated (Empty)");
                return;
            }

            // Create beautiful list view
            const list = document.createElement('ul');
            list.className = 'inventory-list';
            
            data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'inventory-item';
                li.innerHTML = `<span class="item-name">${item.name}</span> <span class="item-count">x${item.count}</span>`;
                list.appendChild(li);
            });
            invContainer.appendChild(list);
            setStatus("Inventory updated");
        }
    </script>
</body>
</html>
